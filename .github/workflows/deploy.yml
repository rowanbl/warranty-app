name: Deploy

# Runs on a merge into main (a push to main) — never on a pull request, so it
# won't show up among PR checks. It tests first, then deploys: the deploy job only
# runs if the tests pass.
on:
  push:
    branches: [main]

# Queue deploys; never run two at once or cancel one mid-flight.
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none
      - uses: actions/cache@v4
        with:
          path: ~/.cache/composer/files
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-
      - run: composer install --no-interaction --prefer-dist --no-progress
      - run: cp .env.example .env && php artisan key:generate
      - run: php artisan test --parallel

  deploy:
    name: Deploy to production
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}
      - name: Trust the server host key
        run: ssh-keyscan -p "${{ secrets.DEPLOY_PORT }}" "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts
      # Pull first so the LATEST deploy.sh runs (bash loads the script into memory
      # at start, so a pull from inside it wouldn't take effect until next time).
      - name: Run the deploy script over SSH
        run: |
          ssh -p "${{ secrets.DEPLOY_PORT }}" "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "cd '${{ secrets.DEPLOY_PATH }}' && git pull --ff-only && bash deploy/deploy.sh"
